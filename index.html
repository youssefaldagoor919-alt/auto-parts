    --gold2: #e8c96b;
    --text: #f0ece4;
    --text2: #9a9590;

  .logo { font-size: 1.2rem; font-weight: 900; color: var(--gold); letter-spacing: -0.5px; }
  .logo span { color: var(--text2); font-weight: 400; font-size: 0.8rem; display: block; }

  .header-actions { display: flex; gap: 12px; align-items: center; }

  .cart-btn {
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 50px;
    padding: 8px 18px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: all 0.2s;
    position: relative;
  }
  .cart-btn:hover { background: var(--gold2); transform: scale(1.03); }
  .cart-count {
    background: #000;
    color: var(--gold);
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 0.75rem;
    display: flex; align-items: center; justify-content: center;
    font-weight: 900;
  }

  .user-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 50px;
    padding: 8px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .user-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ===== HERO ===== */
  .hero {
    padding: 60px 24px 40px;
    text-align: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(200,168,75,0.08) 0%, transparent 70%);
  }
  .hero h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; line-height: 1.2; }
  .hero h1 em { color: var(--gold); font-style: normal; }
  .hero p { color: var(--text2); margin-top: 10px; font-size: 1rem; }

  .section-title {

    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::before {
    content: '';
    display: block; width: 4px; height: 24px;
    background: var(--gold); border-radius: 4px;
  }

  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;

  .product-card:hover {
    transform: translateY(-4px);
    border-color: var(--gold);
    box-shadow: 0 12px 40px rgba(200,168,75,0.1);
  }

  .slider { position: relative; aspect-ratio: 4/3; overflow: hidden; background: #111; }
  .slides { display: flex; transition: transform 0.4s ease; height: 100%; }
  .slides img {
    width: 100%; min-width: 100%; height: 100%;
    object-fit: cover; flex-shrink: 0;
  }
  .slider-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    background: rgba(0,0,0,0.6); color: white;
    border: none; cursor: pointer; padding: 8px 12px;
    font-size: 1rem; z-index: 5; transition: background 0.2s;

  .slider-btn:hover { background: rgba(200,168,75,0.8); }
  .slider-btn.prev { left: 0; border-radius: 0 6px 6px 0; }
  .slider-btn.next { right: 0; border-radius: 6px 0 0 6px; }
  .slider-dots {
    position: absolute; bottom: 8px; width: 100%;
    display: flex; justify-content: center; gap: 5px;

  .dot {
    width: 6px; height: 6px; border-radius: 50%;

  .product-badge {

  .product-price {

    border: none;
    border-radius: 8px;
    padding: 9px 16px;

  /* ===== MODAL BASE ===== */
  .overlay {
    position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;

  .overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    width: 100%; max-width: 480px;
    max-height: 90vh; overflow-y: auto;
    transform: scale(0.95) translateY(20px);
    transition: transform 0.3s;
    padding: 28px;

  .modal-title {
    font-size: 1.3rem; font-weight: 900;
    margin-bottom: 24px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-close {
    background: var(--surface2); border: none; color: var(--text2);
    width: 32px; height: 32px; border-radius: 50%;
    cursor: pointer; font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .modal-close:hover { background: var(--red); color: #fff; }

  /* ===== AUTH MODAL ===== */
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border-radius: 10px; overflow: hidden; border: 1px solid var(--border); }
  .auth-tab {

  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 6px; }
  .form-group input {
    width: 100%; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 16px; color: var(--text);
    font-family: 'Cairo', sans-serif; font-size: 0.95rem;
    transition: border-color 0.2s; outline: none;
  }
  .form-group input:focus { border-color: var(--gold); }
  .form-group input::placeholder { color: var(--text2); }

  .submit-btn {
    width: 100%; background: var(--gold); color: #000;
    border: none; border-radius: 10px;
    padding: 13px; font-family: 'Cairo', sans-serif;
    font-size: 1rem; font-weight: 700; cursor: pointer;

  .submit-btn:hover { background: var(--gold2); }

  .form-error { color: var(--red); font-size: 0.82rem; margin-top: 10px; text-align: center; }

  .cart-empty { text-align: center; color: var(--text2); padding: 40px 0; font-size: 1.1rem; }

  .cart-summary {
    border-top: 1px solid var(--border);

  .cart-total {

  .logout-link {
    color: var(--text2); cursor: pointer; font-size: 0.75rem;
    text-decoration: underline; background: none; border: none;
    font-family: 'Cairo', sans-serif;
    transition: color 0.2s;
  }
  .logout-link:hover { color: var(--red); }

  /* ===== FOOTER ===== */
  footer {
    border-top: 1px solid var(--border);
    padding: 30px 24px;
    text-align: center;
    color: var(--text2); font-size: 0.82rem;
    margin-top: 40px;
  }
  footer a { color: var(--gold); text-decoration: none; }

  /* ===== TOAST ===== */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--surface2); border: 1px solid var(--gold);
    color: var(--text); border-radius: 50px;
    padding: 12px 24px; font-size: 0.9rem; font-weight: 600;
    z-index: 1000; transition: transform 0.3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (max-width: 600px) {
    .products-grid { grid-template-columns: 1fr; }
    header { padding: 12px 16px; }
    .section { padding: 30px 16px; }
  }
</style>
</head>

function slide(id, dir) {
  const p = products.find(x => x.id === id);
  if (!p || p.images.length <= 1) return;
  sliderIndex[id] = ((sliderIndex[id] || 0) + dir + p.images.length) % p.images.length;
  updateSlider(id);
}
function goSlide(id, idx) {
  sliderIndex[id] = idx;
  updateSlider(id);
}
function updateSlider(id) {
  const idx = sliderIndex[id] || 0;
  const slides = document.getElementById('slides-' + id);
  if (slides) slides.style.transform = `translateX(${idx * 100}%)`;
  const p = products.find(x => x.id === id);
  if (p) p.images.forEach((_, i) => {
    const dot = document.getElementById(`dot-${id}-${i}`);
    if (dot) dot.className = 'dot' + (i === idx ? ' active' : '');
  });
}

// ========================
// CART
// ========================
function addToCart(id) {
  if (!currentUser) {
    showToast('سجّل دخولك أولاً لإضافة للسلة 🔒');
    openAuth();
    return;
  }
  const p = products.find(x => x.id === id);
  const existing = cart.find(x => x.id === id);
  if (existing) {
    showToast('المنتج موجود بالسلة بالفعل ✓');
    return;
  }
  cart.push({ ...p });
  updateCartCount();
  const btn = document.getElementById('addBtn-' + id);
  if (btn) {
    btn.textContent = '✓ أضيف';
    btn.classList.add('added');
    setTimeout(() => {
      btn.textContent = '+ أضف للسلة';
      btn.classList.remove('added');
    }, 2000);
  }
  showToast('تمت الإضافة للسلة 🛒');
}

function removeFromCart(id) {
  cart = cart.filter(x => x.id !== id);
  updateCartCount();
  renderCart();
}

function updateCartCount() {
  document.getElementById('cartCount').textContent = cart.length;
}

// ========================
// AUTH
// ========================
function openAuth() {
  document.getElementById('authOverlay').classList.add('open');
  renderAuthForm();
}
function closeAuth() {
  document.getElementById('authOverlay').classList.remove('open');
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tabLogin').className = 'auth-tab' + (tab === 'login' ? ' active' : '');
  document.getElementById('tabRegister').className = 'auth-tab' + (tab === 'register' ? ' active' : '');
  renderAuthForm();
}

function renderAuthForm() {
  const div = document.getElementById('authForm');
  if (currentTab === 'login') {
    div.innerHTML = `
      <div class="form-group">
        <label>رقم الجوال أو الإيميل</label>
        <input type="text" id="loginId" placeholder="0500000000 أو email@gmail.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="submit-btn" onclick="doLogin()">تسجيل الدخول</button>
      <div id="authMsg"></div>
    `;
  } else {
    div.innerHTML = `
      <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="regName" placeholder="محمد العتيبي">
      </div>
      <div class="form-group">
        <label>رقم الجوال</label>
        <input type="tel" id="regPhone" placeholder="05XXXXXXXX">
      </div>
      <div class="form-group">
        <label>البريد الإلكتروني</label>
        <input type="email" id="regEmail" placeholder="example@gmail.com">
      </div>
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="regPass" placeholder="••••••••">
      </div>
      <button class="submit-btn" onclick="doRegister()">إنشاء الحساب</button>
      <div id="authMsg"></div>
    `;
  }
}

function doLogin() {
  const id = document.getElementById('loginId').value.trim();
  const pass = document.getElementById('loginPass').value;
  const msg = document.getElementById('authMsg');
  if (!id || !pass) { msg.className='form-error'; msg.textContent='الرجاء تعبئة جميع الحقول'; return; }
  const user = users.find(u => (u.phone === id || u.email === id) && u.password === pass);
  if (!user) { msg.className='form-error'; msg.textContent='بيانات الدخول غير صحيحة'; return; }
  currentUser = user;
  localStorage.setItem('autoUser', JSON.stringify(user));
  updateUserArea();
  closeAuth();
  showToast('أهلاً ' + user.name + ' 👋');
}

function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const msg = document.getElementById('authMsg');
  if (!name || !phone || !email || !pass) { msg.className='form-error'; msg.textContent='الرجاء تعبئة جميع الحقول'; return; }
  if (!/^05\d{8}$/.test(phone)) { msg.className='form-error'; msg.textContent='رقم الجوال غير صحيح (مثال: 0512345678)'; return; }
  if (!/\S+@\S+\.\S+/.test(email)) { msg.className='form-error'; msg.textContent='البريد الإلكتروني غير صحيح'; return; }
  if (users.find(u => u.phone === phone || u.email === email)) {
    msg.className='form-error'; msg.textContent='رقم الجوال أو الإيميل مسجل مسبقاً'; return;
  }
  const user = { name, phone, email, password: pass };
  users.push(user);
  localStorage.setItem('autoUsers', JSON.stringify(users));
  currentUser = user;
  localStorage.setItem('autoUser', JSON.stringify(user));
  updateUserArea();
  closeAuth();
  showToast('تم إنشاء حسابك بنجاح 🎉');
}

function logout() {
  currentUser = null;
  localStorage.removeItem('autoUser');
  cart = [];
  updateCartCount();
  updateUserArea();
  showToast('تم تسجيل الخروج');
}

function updateUserArea() {
  const area = document.getElementById('userArea');
  if (currentUser) {
    area.innerHTML = `
      <div class="user-info-bar">
        <div class="user-dot"></div>
        <span style="font-size:0.82rem">${currentUser.name}</span>
        <button class="logout-link" onclick="logout()">خروج</button>
      </div>
    `;
  } else {
    area.innerHTML = `<button class="user-btn" onclick="openAuth()">تسجيل الدخول</button>`;
  }
}

        <div class="cart-item">

          <div class="cart-item-price">${item.numericPrice ? item.numericPrice + ' ر.س' : 'السعر عند التأكيد'}</div>
          <button class="remove-item" onclick="removeFromCart(${item.id})">✕</button>

    </div>
    ${currentUser ? `

        <h3>بيانات التوصيل</h3>
        <div class="form-group">
          <label>الاسم</label>
          <input type="text" id="ckName" value="${currentUser.name}" placeholder="الاسم الكامل">
        </div>
        <div class="form-group">
          <label>رقم الجوال</label>
          <input type="tel" id="ckPhone" value="${currentUser.phone}" placeholder="05XXXXXXXX">
        </div>
        <div class="form-group">
          <label>المدينة</label>
          <input type="text" id="ckCity" placeholder="الرياض، جدة، الدمام...">
        </div>
        <div class="form-group">
          <label>العنوان بالتفصيل</label>
          <input type="text" id="ckAddress" placeholder="الحي، الشارع، رقم المبنى">
        </div>
        <div class="form-group">
          <label>ملاحظات (اختياري)</label>
          <input type="text" id="ckNotes" placeholder="أي تفاصيل إضافية">
        </div>
        <button class="submit-btn" id="checkoutBtn" onclick="submitOrder()">✅ تأكيد الطلب</button>

    `}
  `;
}

// ========================
// SUBMIT ORDER + EMAIL
// ========================
async function submitOrder() {
  const name = document.getElementById('ckName').value.trim();
  const phone = document.getElementById('ckPhone').value.trim();
  const city = document.getElementById('ckCity').value.trim();
  const address = document.getElementById('ckAddress').value.trim();
  const notes = document.getElementById('ckNotes').value.trim();
  const msg = document.getElementById('checkoutMsg');
  const btn = document.getElementById('checkoutBtn');

  if (!name || !phone || !city || !address) {
    msg.className = 'form-error'; msg.textContent = 'الرجاء تعبئة بيانات التوصيل كاملة';
    return;
  }

  btn.disabled = true; btn.textContent = 'جاري إرسال الطلب...';

  const orderTime = new Date().toLocaleString('ar-SA', { timeZone: 'Asia/Riyadh' });
  const orderItems = cart.map(item =>
    `• ${item.brand} - ${item.name} (${item.sub})`
  ).join('\n');

  const emailBody = `
طلب جديد من متجر قطع الغيار 🚗

━━━━━━━━━━━━━━━━━━
📋 بيانات الطلب
━━━━━━━━━━━━━━━━━━
التاريخ: ${orderTime}

👤 معلومات العميل:
الاسم: ${name}
الجوال: ${phone}
الإيميل: ${currentUser.email}

📦 المنتجات المطلوبة:
${orderItems}

📍 عنوان التوصيل:
المدينة: ${city}
العنوان: ${address}
${notes ? 'ملاحظات: ' + notes : ''}
━━━━━━━━━━━━━━━━━━

للتواصل مع العميل:
واتساب: https://wa.me/966${phone.replace(/^0/, '')}
  `.trim();

  // EmailJS - send email to owner
  try {
    // Using EmailJS public API
    const emailData = {
      service_id: 'service_autoparts',
      template_id: 'template_order',
      user_id: 'YOUR_PUBLIC_KEY', // سيتم تعيينه
      template_params: {
        to_email: OWNER_EMAIL,
        to_name: 'صاحب المتجر',
        from_name: name,
        customer_phone: phone,
        customer_email: currentUser.email,
        order_details: orderItems,
        delivery_city: city,
        delivery_address: address,
        notes: notes || 'لا توجد',
        order_time: orderTime,
        wa_link: `https://wa.me/966${phone.replace(/^0/, '')}`
      }
    };

    // Try EmailJS
    let sent = false;
    if (typeof emailjs !== 'undefined') {
      try {
        await emailjs.send(emailData.service_id, emailData.template_id, emailData.template_params);
        sent = true;
      } catch(e) { console.log('EmailJS not configured yet'); }
    }

    // Fallback: formsubmit.co (no signup needed)
    if (!sent) {
      const formData = new FormData();
      formData.append('_to', OWNER_EMAIL);
      formData.append('_subject', `🚗 طلب جديد من ${name} - ${city}`);
      formData.append('_captcha', 'false');
      formData.append('_template', 'table');
      formData.append('الاسم', name);
      formData.append('الجوال', phone);
      formData.append('الإيميل', currentUser.email);
      formData.append('المنتجات', orderItems);
      formData.append('المدينة', city);
      formData.append('العنوان', address);
      formData.append('الملاحظات', notes || 'لا توجد');
      formData.append('وقت الطلب', orderTime);
      formData.append('واتساب العميل', `https://wa.me/966${phone.replace(/^0/, '')}`);

      const resp = await fetch(`https://formsubmit.co/${OWNER_EMAIL}`, {
        method: 'POST', body: formData
      });
      if (resp.ok || resp.status === 200) sent = true;
    }

    // Show success
    showSuccess(name, city);
    cart = [];
    updateCartCount();

  } catch(err) {
    // Even if email fails, show success and open WhatsApp
    const waMsg = encodeURIComponent(`طلب جديد من: ${name}\nجوال: ${phone}\nالمدينة: ${city}\n\nالمنتجات:\n${orderItems}`);
    showSuccess(name, city, waMsg);
    cart = [];
    updateCartCount();
  }
}

function showSuccess(name, city, waMsg) {
  const body = document.getElementById('cartBody');
  body.innerHTML = `

          style="display:inline-block;margin-top:20px;background:#25D366;color:#fff;border-radius:10px;padding:12px 24px;text-decoration:none;font-weight:700">

}

}
